name: Instalar Dependencias
description: Instala runtimes y dependencias necesarias para ejecutar la API y pruebas Rest Assured.

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Setup pnpm
      uses: pnpm/action-setup@v6
      with:
        run_install: false

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17
        cache: maven

    - name: Verify runtime versions
      shell: bash
      run: |
        echo "Node:"
        node -v

        echo "pnpm:"
        pnpm -v

        echo "Java:"
        java -version

        echo "Maven:"
        mvn -version

    - name: Install Node dependencies
      shell: bash
      run: |
        pnpm install --frozen-lockfile

    - name: Run pnpm audit
      shell: bash
      run: |
        pnpm audit --audit-level moderate