name: API Rest Assured CI

on:
  push:
    branches:
      - main
      - feature/integrando_auto_rest_assured
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  pages: write
  id-token: write

jobs:
  api-rest-assured-tests:
    name: Run API and Rest Assured tests
    runs-on: ubuntu-latest

    env:
      REST_BASE_URL: http://localhost:3000
      BASE_URL: http://localhost:3000

    steps:
      - name: Preparar repositorio
        uses: actions/checkout@v4

      - name: Instalar Dependencias
        uses: ./.github/actions/install-dependencies

      - name: Levantar API
        shell: bash
        run: |
          set -Eeuo pipefail
          pnpm api:start > api.log 2>&1 &
          echo $! > api.pid
          sleep 1

          if ! ps -p "$(cat api.pid)" > /dev/null; then
            echo "La API no logró iniciar."
            cat api.log
            exit 1
          fi

      - name: Healthcheck API
        shell: bash
        run: |
          set -Eeuo pipefail

          for i in {1..30}; do
            if curl -fsS "$REST_BASE_URL/health"; then
              echo "API lista para ejecutar pruebas."
              exit 0
            fi

            echo "API aún no responde. Reintento $i/30"
            sleep 2
          done

          echo "La API no respondió correctamente."
          cat api.log
          exit 1

      - name: Ejecutar pruebas API
        working-directory: tests/rest-assured-java
        shell: bash
        run: |
          set -Eeuo pipefail
          mvn clean test allure:report -DbaseUrl="$REST_BASE_URL"

      - name: Publicar reporte
        if: always()
        uses: ./.github/actions/publish-api-report
        with:
          artifact-name: allure-api-rest-assured-report
          report-directory: tests/rest-assured-java/target/surefire-reports
          allure-results-directory: tests/rest-assured-java/target/allure-results
          allure-report-directory: tests/rest-assured-java/target/site/allure-report
          api-log: api.log
          api-pid-file: api.pid

      - name: Upload Allure report for GitHub Pages
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: tests/rest-assured-java/target/site/allure-report

  deploy-allure-report:
    name: Deploy Allure Report to GitHub Pages
    needs: api-rest-assured-tests
    if: always()
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Allure Report
        id: deployment
        uses: actions/deploy-pages@v4