name: API Automation CI

on:
  push:
    branches:
      - main
      - feature/integrando_auto_rest_assured
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  pages: write
  id-token: write

jobs:
  api-tests:
    name: Run API and API Tests
    runs-on: ubuntu-latest

    env:
      REST_BASE_URL: http://localhost:3000
      BASE_URL: http://localhost:3000

    steps:
      - name: Preparar repositorio
        uses: actions/checkout@v4

      - name: Instalar Dependencias
        uses: ./.github/actions/install-dependencies

      - name: Levantar API
        shell: bash
        run: |
          set -Eeuo pipefail

          echo "Levantando API en $REST_BASE_URL"
          pnpm api:start > api.log 2>&1 &
          echo $! > api.pid

          sleep 1

          if ! ps -p "$(cat api.pid)" > /dev/null; then
            echo "La API no logró iniciar."
            cat api.log
            exit 1
          fi

          echo "API iniciada con PID $(cat api.pid)"

      - name: Healthcheck API
        shell: bash
        run: |
          set -Eeuo pipefail

          echo "Validando healthcheck en $REST_BASE_URL/health"

          for i in {1..30}; do
            if curl -fsS "$REST_BASE_URL/health"; then
              echo ""
              echo "API lista para ejecutar pruebas."
              exit 0
            fi

            echo "API aún no responde. Reintento $i/30"
            sleep 2
          done

          echo "La API no respondió correctamente al healthcheck."
          cat api.log
          exit 1

      - name: Ejecutar pruebas API Rest Assured
        shell: bash
        run: |
          set -Eeuo pipefail

          mvn -f tests/rest-assured-java/pom.xml clean test -DbaseUrl="$REST_BASE_URL"

      - name: Ejecutar pruebas API Playwright
        shell: bash
        run: |
          set -Eeuo pipefail

          pnpm test:playwright

      - name: Publicar resultados crudos Rest Assured
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-rest-assured
          if-no-files-found: warn
          path: tests/rest-assured-java/target/allure-results/

      - name: Publicar resultados crudos Playwright
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-playwright
          if-no-files-found: warn
          path: tests/playwright-ts/allure-results/

      - name: Publicar logs API
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-log
          if-no-files-found: warn
          path: api.log

      - name: Detener API
        if: always()
        shell: bash
        run: |
          if [ -f api.pid ]; then
            echo "Deteniendo API con PID $(cat api.pid)"
            kill "$(cat api.pid)" || true
          fi

  report-rest-assured:
    name: Report Allure Rest Assured
    needs: api-tests
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Preparar repositorio
        uses: actions/checkout@v4

      - name: Instalar dependencias para Allure
        uses: ./.github/actions/install-dependencies

      - name: Descargar resultados Rest Assured
        uses: actions/download-artifact@v4
        with:
          name: allure-results-rest-assured
          path: rest-assured/allure-results

      - name: Generar reporte Allure Rest Assured
        shell: bash
        run: |
          set -Eeuo pipefail

          pnpm exec allure generate \
            --cwd rest-assured \
            --output allure-report-rest-assured

      - name: Publicar artifact Allure Rest Assured
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-rest-assured
          path: allure-report-rest-assured/

  report-playwright:
    name: Report Allure Playwright
    needs: api-tests
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Preparar repositorio
        uses: actions/checkout@v4

      - name: Instalar dependencias para Allure
        uses: ./.github/actions/install-dependencies

      - name: Descargar resultados Playwright
        uses: actions/download-artifact@v4
        with:
          name: allure-results-playwright
          path: playwright/allure-results

      - name: Generar reporte Allure Playwright
        shell: bash
        run: |
          set -Eeuo pipefail

          pnpm exec allure generate \
            --cwd playwright \
            --output allure-report-playwright

      - name: Publicar artifact Allure Playwright
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-playwright
          path: allure-report-playwright/

  deploy-allure-reports:
    name: Deploy Allure Reports to GitHub Pages
    needs:
      - report-rest-assured
      - report-playwright
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Descargar reporte Rest Assured
        uses: actions/download-artifact@v4
        with:
          name: allure-report-rest-assured
          path: public/rest-assured

      - name: Descargar reporte Playwright
        uses: actions/download-artifact@v4
        with:
          name: allure-report-playwright
          path: public/playwright

      - name: Crear landing page de reportes
        shell: bash
        run: |
          cat > public/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="es">
          <head>
            <meta charset="UTF-8">
            <title>API Automation Reports</title>
            <style>
              body {
                font-family: Arial, sans-serif;
                margin: 40px;
                background: #0d1117;
                color: #f0f6fc;
              }
              h1 {
                color: #58a6ff;
              }
              .card {
                border: 1px solid #30363d;
                border-radius: 8px;
                padding: 20px;
                margin-bottom: 16px;
                background: #161b22;
              }
              a {
                color: #58a6ff;
                font-size: 18px;
                text-decoration: none;
              }
              a:hover {
                text-decoration: underline;
              }
            </style>
          </head>
          <body>
            <h1>API Automation Reports</h1>

            <div class="card">
              <h2>Rest Assured</h2>
              <p>Reporte Allure generado desde pruebas API con Java + Rest Assured.</p>
              <a href="./rest-assured/index.html">Abrir reporte Allure Rest Assured</a>
            </div>

            <div class="card">
              <h2>Playwright API</h2>
              <p>Reporte Allure generado desde pruebas API con TypeScript + Playwright.</p>
              <a href="./playwright/index.html">Abrir reporte Allure Playwright</a>
            </div>
          </body>
          </html>
          EOF

      - name: Preparar artifact para GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy Allure Reports
        id: deployment
        uses: actions/deploy-pages@v4