name: API Automation CI

on:
  push:
    branches:
      - main
      - feature/integrando_auto_rest_assured
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  pages: write
  id-token: write

jobs:
  api-tests:
    name: Run API and API Tests
    runs-on: ubuntu-latest

    env:
      REST_BASE_URL: http://localhost:3000
      BASE_URL: http://localhost:3000

    steps:
      - name: Preparar repositorio
        uses: actions/checkout@v4

      - name: Instalar Dependencias
        uses: ./.github/actions/install-dependencies

      - name: Levantar API
        shell: bash
        run: |
          set -Eeuo pipefail

          echo "Levantando API en $REST_BASE_URL"
          pnpm api:start > api.log 2>&1 &
          echo $! > api.pid

          sleep 1

          if ! ps -p "$(cat api.pid)" > /dev/null; then
            echo "La API no logró iniciar."
            cat api.log
            exit 1
          fi

          echo "API iniciada con PID $(cat api.pid)"

      - name: Healthcheck API
        shell: bash
        run: |
          set -Eeuo pipefail

          echo "Validando healthcheck en $REST_BASE_URL/health"

          for i in {1..30}; do
            if curl -fsS "$REST_BASE_URL/health"; then
              echo ""
              echo "API lista para ejecutar pruebas."
              exit 0
            fi

            echo "API aún no responde. Reintento $i/30"
            sleep 2
          done

          echo "La API no respondió correctamente al healthcheck."
          cat api.log
          exit 1

      - name: Ejecutar pruebas API Rest Assured
        shell: bash
        run: |
          set -Eeuo pipefail

          mvn -f tests/rest-assured-java/pom.xml clean test -DbaseUrl="$REST_BASE_URL"

      - name: Ejecutar pruebas API Playwright
        shell: bash
        run: |
          set -Eeuo pipefail

          pnpm test:playwright

      - name: Instalar y verificar binario Cypress
        shell: bash
        run: |
          set -Eeuo pipefail

          pnpm --filter @portfolio/cypress-api exec cypress install
          pnpm --filter @portfolio/cypress-api exec cypress verify

      - name: Ejecutar pruebas API Cypress
        shell: bash
        run: |
          set -Eeuo pipefail

          pnpm test:cypress

      - name: Ejecutar pruebas API Karate
        shell: bash
        run: |
          set -Eeuo pipefail

          mvn -f tests/karate-java/pom.xml clean test -DbaseUrl="$REST_BASE_URL"

      - name: Publicar resultados crudos Rest Assured
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-rest-assured
          if-no-files-found: warn
          path: tests/rest-assured-java/target/allure-results/

      - name: Publicar resultados crudos Playwright
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-playwright
          if-no-files-found: warn
          path: tests/playwright-ts/allure-results/

      - name: Publicar resultados crudos Cypress
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-cypress
          if-no-files-found: warn
          path: tests/cypress-ts/allure-results/

      - name: Preparar artifact reporte Karate
        if: always()
        shell: bash
        run: |
          set -Eeuo pipefail

          KARATE_REPORT_DIR="tests/karate-java/target/karate-reports"
          mkdir -p "$KARATE_REPORT_DIR"

          echo "Buscando reporte nativo de Karate en: $KARATE_REPORT_DIR"
          find tests/karate-java/target -maxdepth 4 -type f 2>/dev/null | sort | head -120 || true

          if [ ! -f "$KARATE_REPORT_DIR/karate-summary.html" ]; then
            echo "Karate no generó karate-summary.html. Se creará reporte de diagnóstico."

            cat > "$KARATE_REPORT_DIR/karate-summary.html" <<EOF
          <!DOCTYPE html>
          <html lang="es">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Karate Report - Diagnostic</title>
            <style>
              body {
                font-family: Arial, sans-serif;
                margin: 40px;
                background: #0d1117;
                color: #f0f6fc;
              }
              .card {
                border: 1px solid #30363d;
                border-radius: 12px;
                background: #161b22;
                padding: 24px;
                max-width: 920px;
              }
              h1 {
                color: #f97316;
              }
              code {
                background: #21262d;
                padding: 2px 6px;
                border-radius: 6px;
              }
              pre {
                background: #21262d;
                padding: 16px;
                border-radius: 8px;
                overflow-x: auto;
              }
            </style>
          </head>
          <body>
            <div class="card">
              <h1>Karate Report - Diagnostic</h1>
              <p>No se encontró el archivo nativo <code>karate-summary.html</code>.</p>
              <p>Esto normalmente significa que Karate no ejecutó correctamente, no encontró features o el reporte fue generado en otra ruta.</p>
              <p>Revisar en GitHub Actions el step <strong>Ejecutar pruebas API Karate</strong>.</p>
              <pre>Ruta esperada: tests/karate-java/target/karate-reports/karate-summary.html</pre>
            </div>
          </body>
          </html>
          EOF
          fi

          echo "Contenido final del reporte Karate:"
          find "$KARATE_REPORT_DIR" -maxdepth 2 -type f | sort | head -120

      - name: Publicar reporte Karate
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: karate-report
          if-no-files-found: error
          path: tests/karate-java/target/karate-reports/

      - name: Publicar logs API
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-log
          if-no-files-found: warn
          path: api.log

      - name: Detener API
        if: always()
        shell: bash
        run: |
          if [ -f api.pid ]; then
            echo "Deteniendo API con PID $(cat api.pid)"
            kill "$(cat api.pid)" || true
          fi

  report-rest-assured:
    name: Report Allure Rest Assured
    needs: api-tests
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Preparar repositorio
        uses: actions/checkout@v4

      - name: Instalar dependencias para Allure
        uses: ./.github/actions/install-dependencies

      - name: Descargar resultados Rest Assured
        uses: actions/download-artifact@v4
        with:
          name: allure-results-rest-assured
          path: rest-assured/allure-results

      - name: Generar reporte Allure Rest Assured
        shell: bash
        run: |
          set -Eeuo pipefail

          pnpm exec allure generate \
            --cwd rest-assured \
            --output allure-report-rest-assured

      - name: Publicar artifact Allure Rest Assured
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-rest-assured
          path: allure-report-rest-assured/

  report-playwright:
    name: Report Allure Playwright
    needs: api-tests
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Preparar repositorio
        uses: actions/checkout@v4

      - name: Instalar dependencias para Allure
        uses: ./.github/actions/install-dependencies

      - name: Descargar resultados Playwright
        uses: actions/download-artifact@v4
        with:
          name: allure-results-playwright
          path: playwright/allure-results

      - name: Generar reporte Allure Playwright
        shell: bash
        run: |
          set -Eeuo pipefail

          pnpm exec allure generate \
            --cwd playwright \
            --output allure-report-playwright

      - name: Publicar artifact Allure Playwright
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-playwright
          path: allure-report-playwright/

  report-cypress:
    name: Report Allure Cypress
    needs: api-tests
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Preparar repositorio
        uses: actions/checkout@v4

      - name: Instalar dependencias para Allure
        uses: ./.github/actions/install-dependencies

      - name: Descargar resultados Cypress
        uses: actions/download-artifact@v4
        with:
          name: allure-results-cypress
          path: cypress/allure-results

      - name: Generar reporte Allure Cypress
        shell: bash
        run: |
          set -Eeuo pipefail

          pnpm exec allure generate \
            --cwd cypress \
            --output allure-report-cypress

      - name: Publicar artifact Allure Cypress
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-cypress
          path: allure-report-cypress/

  report-karate:
    name: Report Karate
    needs: api-tests
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Descargar reporte Karate
        uses: actions/download-artifact@v4
        with:
          name: karate-report
          path: karate-report

      - name: Validar contenido reporte Karate
        shell: bash
        run: |
          set -Eeuo pipefail

          echo "Contenido descargado desde artifact karate-report:"
          find karate-report -maxdepth 2 -type f | sort | head -120

          if [ ! -f karate-report/karate-summary.html ]; then
            echo "No se encontró karate-summary.html dentro de karate-report."
            exit 1
          fi

      - name: Publicar artifact Karate Report
        uses: actions/upload-artifact@v4
        with:
          name: karate-html-report
          path: karate-report/

  deploy-allure-reports:
    name: Deploy Allure Reports to GitHub Pages
    needs:
      - api-tests
      - report-rest-assured
      - report-playwright
      - report-cypress
      - report-karate
    if: always() && github.ref == 'refs/heads/main' && needs.api-tests.result == 'success'
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Preparar repositorio
        uses: actions/checkout@v4

      - name: Descargar reporte Rest Assured
        uses: actions/download-artifact@v4
        with:
          name: allure-report-rest-assured
          path: public/rest-assured

      - name: Descargar reporte Playwright
        uses: actions/download-artifact@v4
        with:
          name: allure-report-playwright
          path: public/playwright

      - name: Descargar reporte Cypress
        uses: actions/download-artifact@v4
        with:
          name: allure-report-cypress
          path: public/cypress

      - name: Descargar reporte Karate
        uses: actions/download-artifact@v4
        with:
          name: karate-html-report
          path: public/karate

      - name: Preparar Front Report Allure
        shell: bash
        run: |
          set -Eeuo pipefail

          cp -R front-report-allure/. public/

          cat > public/report-metadata.json <<EOF
          {
            "repository": "${{ github.repository }}",
            "branch": "${{ github.ref_name }}",
            "runId": "${{ github.run_id }}",
            "publishedAt": "$(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          }
          EOF

          echo "Contenido final de public:"
          find public -maxdepth 2 -type f | sort | head -160

      - name: Preparar artifact para GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy Allure Reports
        id: deployment
        uses: actions/deploy-pages@v4

