name: API Rest Assured CI

on:
  push:
    branches:
      - main
      - feature/integrando_auto_rest_assured
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  api-rest-assured-tests:
    name: Run API and Rest Assured tests
    runs-on: ubuntu-latest

    env:
      REST_BASE_URL: http://localhost:3000
      BASE_URL: http://localhost:3000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.23.0
          run_install: false

      - name: Verify Node and pnpm versions
        run: |
          node -v
          pnpm -v

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        run: pnpm audit --audit-level moderate

      - name: Start API
        run: |
          pnpm api:start > api.log 2>&1 &
          echo $! > api.pid

      - name: Wait for API healthcheck
        run: |
          echo "Waiting for API at $REST_BASE_URL/health"

          for i in {1..30}; do
            if curl -fsS "$REST_BASE_URL/health"; then
              echo "API is ready"
              exit 0
            fi

            echo "API not ready yet. Retry $i/30"
            sleep 2
          done

          echo "API did not start correctly"
          cat api.log
          exit 1

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Run Rest Assured tests
        working-directory: tests/rest-assured-java
        run: mvn test -DbaseUrl=$REST_BASE_URL

      - name: Upload Maven Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rest-assured-surefire-reports
          path: tests/rest-assured-java/target/surefire-reports/

      - name: Upload API logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-log
          path: api.log

      - name: Stop API
        if: always()
        run: |
          if [ -f api.pid ]; then
            kill $(cat api.pid) || true
          fi