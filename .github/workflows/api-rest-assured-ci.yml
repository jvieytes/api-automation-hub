name: API Rest Assured CI

on:
  push:
    branches:
      - main
      - feature/integrando_auto_rest_assured
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  api-rest-assured-tests:
    name: Run API and Rest Assured tests
    runs-on: ubuntu-latest

    env:
      REST_BASE_URL: http://localhost:3000
      BASE_URL: http://localhost:3000

    steps:
      - name: Preparar repositorio
        uses: actions/checkout@v4

      - name: Instalar Dependencias
        uses: ./.github/actions/install-dependencies

      - name: Levantar API
        shell: bash
        run: |
          set -Eeuo pipefail

          echo "Levantando API en $REST_BASE_URL"
          pnpm api:start > api.log 2>&1 &
          echo $! > api.pid

          sleep 1

          if ! ps -p "$(cat api.pid)" > /dev/null; then
            echo "La API no logró iniciar."
            cat api.log
            exit 1
          fi

          echo "API iniciada con PID $(cat api.pid)"

      - name: Healthcheck API
        shell: bash
        run: |
          set -Eeuo pipefail

          echo "Validando healthcheck en $REST_BASE_URL/health"

          for i in {1..30}; do
            if curl -fsS "$REST_BASE_URL/health"; then
              echo ""
              echo "API lista para ejecutar pruebas."
              exit 0
            fi

            echo "API aún no responde. Reintento $i/30"
            sleep 2
          done

          echo "La API no respondió correctamente al healthcheck."
          echo "Log de la API:"
          cat api.log
          exit 1

      - name: Ejecutar pruebas API
        working-directory: tests/rest-assured-java
        shell: bash
        run: |
          set -Eeuo pipefail
          mvn test -DbaseUrl="$REST_BASE_URL"

      - name: Publicar reporte
        if: always()
        uses: ./.github/actions/publish-api-report
        with:
          artifact-name: api-rest-assured-reports
          report-directory: tests/rest-assured-java/target/surefire-reports
          site-directory: tests/rest-assured-java/target/site
          api-log: api.log
          api-pid-file: api.pid